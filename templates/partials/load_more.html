{% if has_more %}
<div class="load-more" id="load-more-btn">
    <button hx-get="{{ load_more_base }}?page={{ page + 1 }}{% if let Some(cat) = active_category %}&amp;category={{ cat }}{% endif %}"
            hx-target="#article-list"
            hx-swap="beforeend"
            class="btn">
        Load more
    </button>
</div>
{% endif %}
