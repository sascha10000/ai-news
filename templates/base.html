<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI News{% endblock %}</title>
    {% block head %}
    <meta property="og:type" content="website">
    <meta property="og:title" content="AI News">
    <meta property="og:description" content="AI-generated news with full source attribution. Every sentence is sourced.">
    <meta property="og:image" content="/static/hero.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AI News">
    <meta name="twitter:description" content="AI-generated news with full source attribution. Every sentence is sourced.">
    <meta name="twitter:image" content="/static/hero.png">
    {% endblock %}
    <script src="/static/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">AI News</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/admin">Admin</a>
            </div>
        </nav>
        {% block tagline %}<p class="tagline">Synthesized news with full source attribution.</p>{% endblock %}
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        AI News &middot; Every sentence sourced
    </footer>
</body>
</html>
