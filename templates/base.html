<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}edda{% endblock %}</title>
    {% block head %}
    <meta property="og:type" content="website">
    <meta property="og:title" content="edda">
    <meta property="og:description" content="Synthesized news with full source attribution. Every sentence is sourced.">
    <meta property="og:image" content="/static/hero.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="edda">
    <meta name="twitter:description" content="Synthesized news with full source attribution. Every sentence is sourced.">
    <meta name="twitter:image" content="/static/hero.png">
    {% endblock %}
    <script>
        // Read persisted view mode BEFORE first paint so the row/cards
        // choice applies immediately (no flash between layouts).
        (function() {
            try {
                var v = localStorage.getItem('edda-view');
                document.documentElement.setAttribute('data-view', v === 'rows' ? 'rows' : 'cards');
            } catch (e) {
                document.documentElement.setAttribute('data-view', 'cards');
            }
        })();
    </script>
    <script src="/static/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">edda</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/why-account">Why an account?</a>
                <a href="/login">Login</a>
            </div>
        </nav>
        {% block tagline %}<p class="tagline">Synthesized news with full source attribution.</p>{% endblock %}
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p class="footer-tagline">edda &middot; Every sentence sourced</p>
        <nav class="footer-links" aria-label="Rechtliches">
            <a href="/impressum">Impressum</a>
            <a href="/datenschutz">Datenschutz</a>
        </nav>
    </footer>
    <script>
        // Delegated click so the toggle keeps working after HTMX swaps.
        document.addEventListener('click', function(e) {
            var btn = e.target.closest('.view-toggle-btn');
            if (!btn) return;
            var v = btn.dataset.viewTarget === 'rows' ? 'rows' : 'cards';
            document.documentElement.setAttribute('data-view', v);
            try { localStorage.setItem('edda-view', v); } catch (err) {}
            document.querySelectorAll('.view-toggle-btn').forEach(function(b) {
                b.setAttribute('aria-pressed', String(b.dataset.viewTarget === v));
            });
        });
    </script>
</body>
</html>
